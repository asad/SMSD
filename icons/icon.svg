<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3330"/>
      <stop offset="50%" style="stop-color:#166b63"/>
      <stop offset="100%" style="stop-color:#22a196"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ee8c7;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2ba89e;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle radial glow -->
  <circle cx="240" cy="240" r="200" fill="url(#glow)" opacity="0.3"/>

  <!-- Molecular graph — hexagonal ring (benzene) left side -->
  <g stroke="#4ee8c7" stroke-width="5" fill="none" opacity="0.85">
    <!-- Benzene hexagon -->
    <polygon points="160,140 210,111 260,140 260,198 210,227 160,198"/>
    <!-- Inner dashed ring (aromaticity) -->
    <circle cx="210" cy="169" r="28" stroke-dasharray="8,6" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- Bond connections from ring to substituents -->
  <g stroke="#3dd4ae" stroke-width="4.5" opacity="0.7">
    <line x1="260" y1="169" x2="320" y2="169"/>
    <line x1="320" y1="169" x2="365" y2="130"/>
    <line x1="320" y1="169" x2="365" y2="210"/>
    <line x1="160" y1="169" x2="110" y2="130"/>
    <line x1="160" y1="169" x2="110" y2="210"/>
  </g>

  <!-- Atom nodes — ring vertices -->
  <g filter="url(#nodeGlow)">
    <circle cx="160" cy="140" r="10" fill="#4ee8c7"/>
    <circle cx="210" cy="111" r="10" fill="#4ee8c7"/>
    <circle cx="260" cy="140" r="10" fill="#4ee8c7"/>
    <circle cx="260" cy="198" r="10" fill="#4ee8c7"/>
    <circle cx="210" cy="227" r="10" fill="#4ee8c7"/>
    <circle cx="160" cy="198" r="10" fill="#4ee8c7"/>
  </g>

  <!-- Substituent atoms -->
  <g filter="url(#nodeGlow)">
    <circle cx="320" cy="169" r="12" fill="#f0c040"/>
    <circle cx="365" cy="130" r="9" fill="#e86c5a"/>
    <circle cx="365" cy="210" r="9" fill="#78b8f0"/>
    <circle cx="110" cy="130" r="9" fill="#e86c5a"/>
    <circle cx="110" cy="210" r="9" fill="#78b8f0"/>
  </g>

  <!-- MCS highlight overlay — dashed arc connecting matched subgraph -->
  <path d="M130 260 Q210 290 290 260" stroke="#f0c040" stroke-width="3" fill="none"
        stroke-dasharray="10,6" opacity="0.6"/>
  <text x="210" y="305" text-anchor="middle" font-family="Helvetica,Arial,sans-serif"
        font-size="18" fill="#f0c040" opacity="0.6" font-weight="600">MCS</text>

  <!-- Second smaller molecule (substructure match target) -->
  <g stroke="#78b8f0" stroke-width="4" fill="none" opacity="0.7">
    <line x1="290" y1="320" x2="340" y2="290"/>
    <line x1="340" y1="290" x2="390" y2="320"/>
    <line x1="390" y1="320" x2="390" y2="370"/>
    <line x1="390" y1="370" x2="340" y2="400"/>
    <line x1="340" y1="400" x2="290" y2="370"/>
    <line x1="290" y1="370" x2="290" y2="320"/>
  </g>
  <g filter="url(#nodeGlow)">
    <circle cx="290" cy="320" r="8" fill="#78b8f0"/>
    <circle cx="340" cy="290" r="8" fill="#78b8f0"/>
    <circle cx="390" cy="320" r="8" fill="#78b8f0"/>
    <circle cx="390" cy="370" r="8" fill="#78b8f0"/>
    <circle cx="340" cy="400" r="8" fill="#78b8f0"/>
    <circle cx="290" cy="370" r="8" fill="#78b8f0"/>
  </g>

  <!-- Mapping arrows between molecules -->
  <g stroke="#f0c040" stroke-width="2" stroke-dasharray="6,4" opacity="0.45">
    <line x1="260" y1="198" x2="290" y2="320"/>
    <line x1="210" y1="227" x2="340" y2="400"/>
  </g>

  <!-- SMSD Pro text -->
  <text x="256" y="470" text-anchor="middle" font-family="'SF Pro Display',Helvetica,Arial,sans-serif"
        font-weight="800" font-size="52" fill="#ffffff" letter-spacing="2">
    SMSD Pro
  </text>

  <!-- Tagline -->
  <text x="256" y="496" text-anchor="middle" font-family="'SF Pro Display',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="16" fill="#4ee8c7" opacity="0.7" letter-spacing="3">
    MOLECULAR GRAPH MATCHING
  </text>
</svg>
